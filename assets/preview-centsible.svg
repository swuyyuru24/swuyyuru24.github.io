<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0f2440"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="340" fill="url(#bg)" rx="8"/>
  <!-- Browser chrome -->
  <rect x="0" y="0" width="600" height="32" fill="#111827" rx="8"/>
  <rect x="0" y="16" width="600" height="16" fill="#111827"/>
  <circle cx="18" cy="16" r="5" fill="#ef4444"/>
  <circle cx="36" cy="16" r="5" fill="#fbbf24"/>
  <circle cx="54" cy="16" r="5" fill="#22c55e"/>
  <rect x="180" y="9" width="240" height="14" rx="4" fill="#1f2937"/>
