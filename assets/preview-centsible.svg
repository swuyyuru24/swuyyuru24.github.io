  <rect x="190" y="230" width="28" height="36" rx="3" fill="url(#bar1)" opacity="0.7"/>
  <rect x="230" y="210" width="28" height="56" rx="3" fill="url(#bar1)" opacity="0.8"/>
  <rect x="270" y="195" width="28" height="71" rx="3" fill="url(#bar1)"/>
  <rect x="310" y="220" width="28" height="46" rx="3" fill="url(#bar1)" opacity="0.75"/>
  <rect x="350" y="200" width="28" height="66" rx="3" fill="url(#bar1)" opacity="0.85"/>
  <rect x="390" y="185" width="28" height="81" rx="3" fill="url(#bar1)"/>
  <rect x="430" y="215" width="28" height="51" rx="3" fill="url(#bar1)" opacity="0.7"/>
  <rect x="470" y="240" width="28" height="26" rx="3" fill="url(#bar1)" opacity="0.6"/>
  <rect x="510" y="225" width="28" height="41" rx="3" fill="url(#bar1)" opacity="0.8"/>
  <text x="200" y="258" font-family="system-ui,sans-serif" font-size="8" fill="#4b5563">Jan</text>
  <text x="270" y="258" font-family="system-ui,sans-serif" font-size="8" fill="#4b5563">Mar</text>
  <text x="350" y="258" font-family="system-ui,sans-serif" font-size="8" fill="#4b5563">May</text>
  <text x="430" y="258" font-family="system-ui,sans-serif" font-size="8" fill="#4b5563">Jul</text>
  <text x="510" y="258" font-family="system-ui,sans-serif" font-size="8" fill="#4b5563">Sep</text>
  <!-- Recent transactions -->
  <rect x="158" y="292" width="424" height="36" rx="8" fill="#1a2744"/>
  <text x="174" y="314" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">Recent: Grocery Store</text>
  <text x="520" y="314" text-anchor="end" font-family="system-ui,sans-serif" font-size="10" fill="#ef4444">-$42.80</text>
