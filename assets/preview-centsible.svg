  <rect x="158" y="46" width="200" height="80" rx="10" fill="#1a2744"/>
  <text x="174" y="68" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">Total Balance</text>
  <text x="174" y="94" font-family="system-ui,sans-serif" font-weight="700" font-size="22" fill="#e5e7eb">$24,580.42</text>
  <text x="174" y="114" font-family="system-ui,sans-serif" font-size="9" fill="#22c55e">+12.4% this month</text>
  <!-- Income card -->
