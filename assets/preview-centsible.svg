  <rect x="16" y="92" width="108" height="24" rx="4" fill="#22c55e" opacity="0.15"/>
  <text x="70" y="108" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#22c55e">Dashboard</text>
  <text x="32" y="136" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">Transactions</text>
