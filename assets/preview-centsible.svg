  <text x="390" y="68" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">Monthly Budget</text>
  <text x="390" y="94" font-family="system-ui,sans-serif" font-weight="700" font-size="22" fill="#e5e7eb">$3,200.00</text>
  <rect x="390" y="104" width="176" height="6" rx="3" fill="#1f2937"/>
